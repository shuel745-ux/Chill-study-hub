<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyFlow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #0f0f13;
  --bg2: #16161d;
  --bg3: #1e1e28;
  --bg4: #252533;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e8f0;
  --text2: #9090a8;
  --text3: #5a5a72;
  --accent: #7c6af7;
  --accent2: #9d8fff;
  --accent-bg: rgba(124,106,247,0.12);
  --accent-border: rgba(124,106,247,0.3);
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.1);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.1);
  --teal: #2dd4bf;
  --teal-bg: rgba(45,212,191,0.1);
  --pink: #f472b6;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* === LAYOUT === */
.app-shell {
  display: grid;
  grid-template-columns: 220px 1fr;
  grid-template-rows: 56px 1fr;
  min-height: 100vh;
}

/* === TOPBAR === */
.topbar {
  grid-column: 1 / -1;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-weight: 600;
  font-size: 17px;
  letter-spacing: -0.3px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo span { color: var(--accent2); }
.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
.role-badge {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.role-badge.student { background: var(--teal-bg); color: var(--teal); border: 1px solid rgba(45,212,191,0.2); }
.role-badge.admin { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
.user-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--accent-bg);
  border: 1px solid var(--accent-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 500; color: var(--accent2);
}

/* === SIDEBAR === */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
  overflow-y: auto;
}
.nav-section {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: 0.6px;
  text-transform: uppercase;
  padding: 12px 10px 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 14px;
  color: var(--text2);
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent-bg); color: var(--accent2); }
.nav-item i { width: 16px; text-align: center; font-size: 15px; }

/* === MAIN === */
.main {
  padding: 28px;
  overflow-y: auto;
  position: relative;
}

.page { display: none; }
.page.active { display: block; }

.page-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.4px;
  margin-bottom: 6px;
}
.page-sub {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 28px;
}

/* === CARDS === */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.card-sm { padding: 14px 16px; }

/* === POMODORO FLOAT === */
.pomo-float {
  position: fixed;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
.pomo-pill {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow);
  width: 72px;
  transition: all 0.3s ease;
}
.pomo-pill:hover { width: 180px; }
.pomo-pill:hover .pomo-labels { opacity: 1; }
.pomo-labels {
  opacity: 0;
  transition: opacity 0.2s;
  width: 100%;
  overflow: hidden;
}
.pomo-ring {
  position: relative;
  width: 44px; height: 44px;
  flex-shrink: 0;
}
.pomo-ring svg { transform: rotate(-90deg); }
.pomo-ring .track { fill: none; stroke: var(--bg4); stroke-width: 3; }
.pomo-ring .progress { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.pomo-time {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  white-space: nowrap;
}
.pomo-label {
  font-size: 10px;
  color: var(--text3);
  text-align: center;
  white-space: nowrap;
}
.pomo-controls { display: flex; gap: 6px; }
.pomo-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  transition: all 0.15s;
}
.pomo-btn:hover { background: var(--accent-bg); color: var(--accent2); border-color: var(--accent-border); }
.pomo-btn.active-btn { background: var(--accent-bg); color: var(--accent2); border-color: var(--accent-border); }
.pomo-mode-btns { display: flex; gap: 4px; flex-direction: column; }
.pomo-mode-btn {
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.pomo-mode-btn.active { background: var(--accent-bg); color: var(--accent2); border-color: var(--accent-border); }

/* === DASHBOARD === */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
}
.stat-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
.stat-val { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
.stat-val.accent { color: var(--accent2); }
.stat-val.green { color: var(--green); }
.stat-val.amber { color: var(--amber); }
.stat-val.teal { color: var(--teal); }
.stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 20px;
}
.section-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.section-title a {
  font-size: 12px;
  color: var(--accent2);
  cursor: pointer;
  text-decoration: none;
}

/* Sessions list */
.session-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.session-item:last-child { border-bottom: none; }
.session-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.session-dot.focus { background: var(--accent); }
.session-dot.break { background: var(--green); }
.session-info { flex: 1; }
.session-name { font-size: 13px; font-weight: 500; }
.session-meta { font-size: 12px; color: var(--text3); }
.session-dur {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text2);
}

/* Mini calendar */
.mini-cal { }
.mini-cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.mini-cal-title { font-size: 13px; font-weight: 500; }
.mini-cal-nav {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  transition: all 0.15s;
}
.mini-cal-nav:hover { background: var(--bg3); color: var(--text); }
.mini-cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.mini-cal-dow {
  text-align: center;
  font-size: 10px;
  color: var(--text3);
  padding: 4px 0;
}
.mini-cal-day {
  text-align: center;
  font-size: 12px;
  padding: 6px 4px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text2);
  transition: all 0.15s;
  position: relative;
}
.mini-cal-day:hover { background: var(--bg3); color: var(--text); }
.mini-cal-day.today { background: var(--accent-bg); color: var(--accent2); font-weight: 500; }
.mini-cal-day.has-event::after {
  content: '';
  position: absolute;
  bottom: 2px; left: 50%;
  transform: translateX(-50%);
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent);
}
.mini-cal-day.other { color: var(--text3); }
.mini-cal-day.session-day { background: var(--green-bg); color: var(--green); }

/* === CALENDAR PAGE === */
.cal-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}
.cal-nav-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.cal-nav-btn:hover { background: var(--bg3); color: var(--text); }
.cal-month-title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
.cal-view-btns { margin-left: auto; display: flex; gap: 4px; }
.cal-view-btn {
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.cal-view-btn.active { background: var(--accent-bg); color: var(--accent2); border-color: var(--accent-border); }

.full-cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg2);
}
.full-cal-dow {
  background: var(--bg3);
  text-align: center;
  padding: 10px;
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  border-bottom: 1px solid var(--border);
}
.full-cal-cell {
  min-height: 100px;
  padding: 8px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.full-cal-cell:hover { background: var(--bg3); }
.full-cal-cell.today { background: var(--accent-bg); }
.full-cal-cell.other { opacity: 0.4; }
.full-cal-cell:nth-child(7n) { border-right: none; }
.cell-num {
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 4px;
}
.full-cal-cell.today .cell-num {
  color: var(--accent2);
}
.cell-event {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}
.cell-event.pomo { background: rgba(124,106,247,0.2); color: var(--accent2); }
.cell-event.schedule { background: var(--teal-bg); color: var(--teal); }
.cell-event.activity { background: var(--green-bg); color: var(--green); }

/* === TIMER PAGE === */
.timer-layout {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 24px;
  align-items: start;
}
.big-timer-ring {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px;
}
.big-ring-wrap {
  position: relative;
  width: 220px; height: 220px;
  margin-bottom: 24px;
}
.big-ring-wrap svg { transform: rotate(-90deg); }
.big-ring-track { fill: none; stroke: var(--bg4); stroke-width: 8; }
.big-ring-prog { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.big-timer-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.big-time {
  font-family: 'DM Mono', monospace;
  font-size: 42px;
  font-weight: 500;
  letter-spacing: -1px;
  color: var(--text);
}
.big-mode-label {
  font-size: 12px;
  color: var(--text3);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
.timer-mode-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.timer-mode-btn {
  flex: 1;
  padding: 9px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.timer-mode-btn.active { background: var(--accent-bg); color: var(--accent2); border-color: var(--accent-border); }
.timer-main-btns {
  display: flex;
  gap: 12px;
  justify-content: center;
}
.btn-primary {
  padding: 10px 28px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-primary:hover { background: var(--accent2); }
.btn-ghost {
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-ghost:hover { background: var(--bg3); color: var(--text); }

.session-label-input {
  width: 100%;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  margin-bottom: 12px;
  outline: none;
  transition: border-color 0.15s;
}
.session-label-input:focus { border-color: var(--accent-border); }
.session-label-input::placeholder { color: var(--text3); }

/* Log table */
.log-table { width: 100%; border-collapse: collapse; }
.log-table th {
  text-align: left;
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
.log-table td {
  padding: 10px 12px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.log-table tr:last-child td { border-bottom: none; }
.log-table tr:hover td { background: var(--bg3); }
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
}
.tag.focus { background: var(--accent-bg); color: var(--accent2); }
.tag.break { background: var(--green-bg); color: var(--green); }

/* === SCHEDULE PAGE === */
.upload-zone {
  border: 2px dashed var(--border2);
  border-radius: var(--radius);
  padding: 48px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg2);
  margin-bottom: 24px;
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--accent-bg); }
.upload-zone i { font-size: 32px; color: var(--text3); margin-bottom: 12px; display: block; }
.upload-zone h3 { font-size: 15px; margin-bottom: 6px; }
.upload-zone p { font-size: 13px; color: var(--text3); }
.upload-zone.drag i { color: var(--accent2); }

.ai-chat {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.ai-chat-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg3);
}
.ai-badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 20px;
  background: var(--accent-bg);
  color: var(--accent2);
  font-weight: 500;
}
.ai-messages {
  padding: 16px;
  min-height: 200px;
  max-height: 360px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.ai-msg {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.ai-msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--bg4);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}
.msg-avatar.ai-av { background: var(--accent-bg); color: var(--accent2); }
.msg-bubble {
  max-width: 80%;
  padding: 9px 13px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  line-height: 1.5;
  background: var(--bg3);
  color: var(--text);
}
.ai-msg.user .msg-bubble { background: var(--accent-bg); color: var(--accent2); }
.ai-input-row {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.ai-input {
  flex: 1;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}
.ai-input:focus { border-color: var(--accent-border); }
.ai-input::placeholder { color: var(--text3); }
.btn-send {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: background 0.15s;
}
.btn-send:hover { background: var(--accent2); }

/* === ACTIVITIES PAGE === */
.activities-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.btn-outline {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--accent-border);
  background: transparent;
  color: var(--accent2);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-outline:hover { background: var(--accent-bg); }

.activities-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.activity-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.2s;
}
.activity-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.activity-card.added { border-color: var(--green); }
.activity-banner {
  height: 6px;
}
.activity-body { padding: 16px; }
.activity-cat {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.activity-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
.activity-desc { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 12px; }
.activity-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}
.meta-chip {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 20px;
  background: var(--bg4);
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 4px;
}
.activity-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg3);
}
.add-cal-check {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
}
.add-cal-check input[type="checkbox"] {
  width: 16px; height: 16px;
  cursor: pointer;
  accent-color: var(--accent);
}
.seats-left { font-size: 12px; color: var(--text3); }

/* === ADMIN MODAL === */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 28px;
  width: 480px;
  max-width: 95vw;
  box-shadow: var(--shadow);
  transform: translateY(8px);
  transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
.modal-close { cursor: pointer; color: var(--text3); transition: color 0.15s; }
.modal-close:hover { color: var(--text); }
.form-row { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.4px; }
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent-border); }
.form-select option { background: var(--bg3); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* === TOAST === */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 12px 20px;
  font-size: 13px;
  box-shadow: var(--shadow);
  transition: transform 0.3s ease;
  z-index: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast i { color: var(--green); }

/* scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

/* Loading dots */
.typing { display: flex; gap: 4px; padding: 4px 0; }
.typing span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text3);
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); }
  40% { transform: translateY(-6px); }
}

/* ring animation */
@keyframes ring-pulse {
  0%,100% { stroke-width: 8; }
  50% { stroke-width: 10; }
}
.big-ring-prog.running { animation: ring-pulse 2s infinite; }

/* === STUDY ROOMS === */
.room-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.2s;
  cursor: pointer;
}
.room-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.room-card.active-room { border-color: var(--accent-border); }
.room-card-top {
  height: 5px;
}
.room-card-body { padding: 16px; }
.room-card-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.room-card-sub { font-size: 12px; color: var(--text3); margin-bottom: 12px; }
.room-card-meta { display: flex; align-items: center; justify-content: space-between; }
.room-member-pile { display: flex; }
.room-member-pile .mp {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid var(--bg2);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 500;
  margin-left: -6px;
}
.room-member-pile .mp:first-child { margin-left: 0; }
.room-code-badge {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 20px;
  background: var(--accent-bg);
  color: var(--accent2);
  letter-spacing: 1px;
}
.online-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  box-shadow: 0 0 6px var(--green);
  margin-right: 4px;
}

/* Room member chip */
.member-chip {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px 5px 5px;
  font-size: 12px;
}
.member-chip .av {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600;
}
.member-chip.me { border-color: var(--accent-border); color: var(--accent2); }

/* Chat messages */
.chat-msg {
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.chat-msg.me { flex-direction: row-reverse; }
.chat-av {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600;
  flex-shrink: 0;
}
.chat-bubble {
  max-width: 75%;
  padding: 7px 12px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.4;
  background: var(--bg3);
}
.chat-msg.me .chat-bubble { background: var(--accent-bg); color: var(--accent2); }
.chat-name { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
.chat-msg.me .chat-name { text-align: right; }

/* === LIFE BOARD === */
.lb-grid {
  columns: 3;
  column-gap: 16px;
}
@media (max-width: 900px) { .lb-grid { columns: 2; } }
.lb-card {
  break-inside: avoid;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
  transition: all 0.2s;
}
.lb-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.lb-media {
  width: 100%;
  display: block;
  object-fit: cover;
  max-height: 320px;
}
.lb-video {
  width: 100%;
  max-height: 280px;
}
.lb-placeholder {
  width: 100%;
  padding: 40px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
}
.lb-body { padding: 12px 14px; }
.lb-cat-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 20px;
  margin-bottom: 7px;
  font-weight: 500;
}
.lb-caption { font-size: 13px; line-height: 1.5; margin-bottom: 10px; }
.lb-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text3);
}
.lb-like-btn {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; gap: 5px;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  transition: all 0.15s;
}
.lb-like-btn:hover { background: var(--red-bg); color: var(--red); }
.lb-like-btn.liked { color: var(--red); }

/* Filters */
.lb-filter {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.lb-filter:hover { background: var(--bg3); color: var(--text); }
.lb-filter.active { background: var(--accent-bg); color: var(--accent2); border-color: var(--accent-border); }

/* Cat picker in modal */
.cat-pick {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.cat-pick:hover { background: var(--bg3); }
.cat-pick.active { background: var(--accent-bg); color: var(--accent2); border-color: var(--accent-border); }


</head>
<body>

<div class="app-shell">
  <!-- TOPBAR -->
  <header class="topbar">
    <div class="logo"><i class="fas fa-layer-group" style="color:var(--accent2);font-size:16px"></i> Study<span>Flow</span></div>
    <div class="topbar-right">
      <span class="role-badge student" id="roleToggle" onclick="toggleRole()" title="Click to toggle Admin/Student">Student</span>
      <div class="user-avatar">AJ</div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="nav-section">Overview</div>
    <div class="nav-item active" onclick="showPage('dashboard', this)">
      <i class="fas fa-home"></i> Dashboard
    </div>
    <div class="nav-item" onclick="showPage('calendar', this)">
      <i class="fas fa-calendar"></i> Calendar
    </div>
    <div class="nav-section">Tools</div>
    <div class="nav-item" onclick="showPage('timer', this)">
      <i class="fas fa-clock"></i> Timer
    </div>
    <div class="nav-item" onclick="showPage('schedule', this)">
      <i class="fas fa-robot"></i> AI Schedule
    </div>
    <div class="nav-section">Community</div>
    <div class="nav-item" onclick="showPage('activities', this)">
      <i class="fas fa-calendar-star"></i> Activities
    </div>
    <div class="nav-item" onclick="showPage('rooms', this)">
      <i class="fas fa-door-open"></i> Study Rooms
    </div>
    <div class="nav-item" onclick="showPage('lifeboard', this)">
      <i class="fas fa-images"></i> Life Board
    </div>
    <div class="nav-item admin-only" id="adminNavItem" style="display:none" onclick="showPage('admin', this)">
      <i class="fas fa-shield"></i> Admin Panel
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page active">
      <div class="page-title">Good morning, Alex 👋</div>
      <div class="page-sub">Here's how your study week is going</div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Focus Hours Today</div>
          <div class="stat-val accent" id="statToday">0h 0m</div>
          <div class="stat-sub">Goal: 4h 0m</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Sessions This Week</div>
          <div class="stat-val green" id="statWeek">0</div>
          <div class="stat-sub">Focus sessions</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Activities Joined</div>
          <div class="stat-val amber" id="statActivities">0</div>
          <div class="stat-sub">In calendar</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Current Streak</div>
          <div class="stat-val teal">3</div>
          <div class="stat-sub">Days studied</div>
        </div>
      </div>

      <div class="dashboard-grid">
        <div class="card">
          <div class="section-title">Recent Sessions <a onclick="showPage('timer',document.querySelector('.nav-item:nth-child(5)'))">View all →</a></div>
          <div id="dashSessionList">
            <div style="color:var(--text3);font-size:13px;padding:20px 0;text-align:center;">No sessions yet. Start your first Pomodoro!</div>
          </div>
        </div>
        <div class="card">
          <div class="section-title">This Month</div>
          <div class="mini-cal" id="miniCal"></div>
        </div>
      </div>
    </div>

    <!-- CALENDAR PAGE -->
    <div id="page-calendar" class="page">
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="calNav(-1)"><i class="fas fa-chevron-left"></i></button>
        <div class="cal-month-title" id="calTitle"></div>
        <button class="cal-nav-btn" onclick="calNav(1)"><i class="fas fa-chevron-right"></i></button>
        <div class="cal-view-btns">
          <button class="cal-view-btn active">Month</button>
        </div>
      </div>
      <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)"><span style="width:10px;height:10px;border-radius:50%;background:var(--accent);display:inline-block"></span> Focus Session</div>
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)"><span style="width:10px;height:10px;border-radius:50%;background:var(--teal);display:inline-block"></span> Schedule</div>
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)"><span style="width:10px;height:10px;border-radius:50%;background:var(--green);display:inline-block"></span> Activity</div>
      </div>
      <div class="full-cal-grid" id="fullCal"></div>
    </div>

    <!-- TIMER PAGE -->
    <div id="page-timer" class="page">
      <div class="page-title">Pomodoro Timer</div>
      <div class="page-sub">Track your focus sessions and log them to your calendar</div>
      <div class="timer-layout">
        <div class="card" style="text-align:center">
          <div class="big-timer-ring">
            <div class="timer-mode-row">
              <button class="timer-mode-btn active" onclick="setTimerMode('focus',this)">Focus</button>
              <button class="timer-mode-btn" onclick="setTimerMode('short',this)">Short Break</button>
              <button class="timer-mode-btn" onclick="setTimerMode('long',this)">Long Break</button>
            </div>
            <div class="big-ring-wrap">
              <svg width="220" height="220" viewBox="0 0 220 220">
                <circle class="big-ring-track" cx="110" cy="110" r="96"/>
                <circle class="big-ring-prog" id="bigRingProg" cx="110" cy="110" r="96" stroke-dasharray="603.2" stroke-dashoffset="0"/>
              </svg>
              <div class="big-timer-text">
                <div class="big-time" id="bigTime">25:00</div>
                <div class="big-mode-label" id="bigModeLabel">FOCUS</div>
              </div>
            </div>
            <div style="margin-bottom:20px;width:280px">
              <input class="session-label-input" id="sessionLabel" type="text" placeholder="What are you working on? (optional)">
            </div>
            <div class="timer-main-btns">
              <button class="btn-primary" id="timerStartBtn" onclick="toggleTimer()">Start</button>
              <button class="btn-ghost" onclick="resetTimer()">Reset</button>
            </div>
          </div>
        </div>
        <div>
          <div class="card" style="margin-bottom:16px">
            <div class="section-title">Session Log</div>
            <div style="overflow-x:auto">
              <table class="log-table">
                <thead>
                  <tr>
                    <th>Label</th>
                    <th>Type</th>
                    <th>Duration</th>
                    <th>Time</th>
                  </tr>
                </thead>
                <tbody id="sessionLogBody">
                  <tr><td colspan="4" style="color:var(--text3);text-align:center;padding:20px">No sessions logged yet</td></tr>
                </tbody>
              </table>
            </div>
          </div>
          <div class="card">
            <div class="section-title">Timer Settings</div>
            <div style="display:flex;flex-direction:column;gap:12px">
              <div>
                <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Focus Duration (min)</div>
                <input type="number" id="settingFocus" value="25" min="1" max="90" class="session-label-input" style="width:100%" onchange="updateDurations()">
              </div>
              <div>
                <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Short Break (min)</div>
                <input type="number" id="settingShort" value="5" min="1" max="30" class="session-label-input" style="width:100%" onchange="updateDurations()">
              </div>
              <div>
                <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Long Break (min)</div>
                <input type="number" id="settingLong" value="15" min="1" max="60" class="session-label-input" style="width:100%" onchange="updateDurations()">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- AI SCHEDULE PAGE -->
    <div id="page-schedule" class="page">
      <div class="page-title">AI Schedule Assistant</div>
      <div class="page-sub">Upload your timetable or paste your schedule — AI will extract and save events to your calendar</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <div>
          <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <h3>Drop your schedule here</h3>
            <p>Supports PDF, images, or text files</p>
            <p style="margin-top:8px;font-size:12px;opacity:0.6">or click to browse</p>
          </div>
          <input type="file" id="fileInput" style="display:none" accept=".pdf,.png,.jpg,.jpeg,.txt,.csv" onchange="handleFileUpload(this)">

          <div class="card">
            <div class="section-title">Extracted Schedule Events</div>
            <div id="extractedEvents" style="min-height:60px">
              <div style="color:var(--text3);font-size:13px;text-align:center;padding:20px">Upload a schedule or chat with AI to add events</div>
            </div>
          </div>
        </div>
        <div>
          <div class="ai-chat">
            <div class="ai-chat-header">
              <i class="fas fa-robot" style="color:var(--accent2)"></i>
              <span style="font-size:14px;font-weight:500">Schedule AI</span>
              <span class="ai-badge">Powered by Claude</span>
            </div>
            <div class="ai-messages" id="aiMessages">
              <div class="ai-msg">
                <div class="msg-avatar ai-av"><i class="fas fa-robot" style="font-size:11px"></i></div>
                <div class="msg-bubble">Hi! I'm your schedule assistant. You can paste your timetable text here, or upload a file on the left. I'll extract your classes, deadlines, and events and add them to your calendar. How can I help?</div>
              </div>
            </div>
            <div class="ai-input-row">
              <input class="ai-input" id="aiInput" type="text" placeholder="Paste your schedule or describe events..." onkeydown="if(event.key==='Enter')sendAiMsg()">
              <button class="btn-send" onclick="sendAiMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ACTIVITIES PAGE -->
    <div id="page-activities" class="page">
      <div class="activities-header">
        <div>
          <div class="page-title" style="margin-bottom:4px">Student Activities</div>
          <div style="font-size:14px;color:var(--text2)">Browse and add activities to your calendar</div>
        </div>
        <button class="btn-outline admin-only" id="addActivityBtn" style="display:none" onclick="openModal()">
          <i class="fas fa-plus"></i> Post Activity
        </button>
      </div>
      <div class="activities-grid" id="activitiesGrid"></div>
    </div>

    <!-- ADMIN PAGE -->
    <div id="page-admin" class="page">
      <div class="page-title">Admin Panel</div>
      <div class="page-sub">Manage activities and view student engagement</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px">
        <div class="stat-card"><div class="stat-label">Total Activities</div><div class="stat-val accent" id="adminActCount">0</div></div>
        <div class="stat-card"><div class="stat-label">Total Sign-ups</div><div class="stat-val green" id="adminSignups">0</div></div>
        <div class="stat-card"><div class="stat-label">Active Students</div><div class="stat-val amber">128</div></div>
      </div>
      <div class="card">
        <div class="section-title">All Activities <button class="btn-outline" style="font-size:12px;padding:5px 12px" onclick="openModal()"><i class="fas fa-plus"></i> Add New</button></div>
        <table class="log-table" style="width:100%">
          <thead><tr><th>Title</th><th>Date</th><th>Category</th><th>Sign-ups</th><th>Actions</th></tr></thead>
          <tbody id="adminTable"><tr><td colspan="5" style="color:var(--text3);text-align:center;padding:20px">No activities yet</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- STUDY ROOMS PAGE -->
    <div id="page-rooms" class="page">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px">
        <div>
          <div class="page-title" style="margin-bottom:4px">Study Rooms</div>
          <div style="font-size:14px;color:var(--text2)">Create or join a private room — study together with friends</div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn-outline" onclick="openRoomModal('join')"><i class="fas fa-sign-in-alt"></i> Join with Code</button>
          <button class="btn-primary" style="display:flex;align-items:center;gap:6px" onclick="openRoomModal('create')"><i class="fas fa-plus"></i> Create Room</button>
        </div>
      </div>

<!-- TOAST -->
<div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg"></span></div>

<script>
// ========== STATE ==========
let isAdmin = false;
let timerInterval = null;
let timerRunning = false;
let timerMode = 'focus';
let timerDurations = { focus: 25*60, short: 5*60, long: 15*60 };
let timeLeft = 25*60;
let totalTime = 25*60;
let sessions = [];
let calendarEvents = [];
let activities = [];
let calDate = new Date();

// Seed demo activities
activities = [
  { id: 1, title: 'Photography Club Workshop', desc: 'Learn composition and lighting with DSLR cameras. No experience needed!', date: '2025-06-14', time: '14:00', category: 'Arts', seats: 20, signups: 12, location: 'Media Lab B3', color: 'pink' },
  { id: 2, title: 'Hackathon: Climate Tech', desc: 'Build tech solutions for climate change in teams of 3-4. Prizes for top 3 teams.', date: '2025-06-21', time: '09:00', category: 'Technology', seats: 40, signups: 28, location: 'Innovation Hub', color: 'purple' },
  { id: 3, title: 'Campus 5K Fun Run', desc: 'Kick off the semester with a casual 5K around campus. All fitness levels welcome!', date: '2025-06-07', time: '07:30', category: 'Sports', seats: 100, signups: 45, location: 'Starting: Main Gate', color: 'green' },
  { id: 4, title: 'Cultural Food Fair', desc: 'Taste dishes from 20+ cultures. Share your own recipes and win prizes.', date: '2025-06-28', time: '11:00', category: 'Culture', seats: 200, signups: 89, location: 'Central Courtyard', color: 'amber' },
  { id: 5, title: 'Machine Learning Study Group', desc: 'Weekly sessions diving into ML fundamentals with hands-on Jupyter notebooks.', date: '2025-06-10', time: '18:00', category: 'Academic', seats: 25, signups: 17, location: 'Library Level 3', color: 'teal' },
  { id: 6, title: 'Beach Cleanup Volunteering', desc: 'Join us at East Coast Park for a 2-hour cleanup drive. T-shirts provided!', date: '2025-06-15', time: '08:00', category: 'Volunteering', seats: 50, signups: 23, location: 'East Coast Park', color: 'red' },
];

// Seed a few demo sessions
sessions = [
  { label: 'CS3240 Revision', type: 'focus', duration: 1500, time: new Date(Date.now() - 2*3600000), date: new Date(Date.now() - 2*3600000) },
  { label: 'Essay Draft', type: 'focus', duration: 1500, time: new Date(Date.now() - 5*3600000), date: new Date(Date.now() - 5*3600000) },
  { label: 'Short Break', type: 'break', duration: 300, time: new Date(Date.now() - 4.9*3600000), date: new Date(Date.now() - 4.9*3600000) },
];

// ========== NAVIGATION ==========
function showPage(id, navEl) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (navEl) navEl.classList.add('active');
  if (id === 'calendar') renderFullCal();
  if (id === 'dashboard') { renderMiniCal(); renderDashSessions(); updateStats(); }
  if (id === 'activities') renderActivities();
  if (id === 'admin') renderAdmin();
  if (id === 'rooms') renderMyRooms();
  if (id === 'lifeboard') renderLifeBoard();
}

// ========== ROLE TOGGLE ==========
function toggleRole() {
  isAdmin = !isAdmin;
  const badge = document.getElementById('roleToggle');
  badge.textContent = isAdmin ? 'Admin' : 'Student';
  badge.className = 'role-badge ' + (isAdmin ? 'admin' : 'student');
  document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'flex' : 'none');
  document.getElementById('addActivityBtn').style.display = isAdmin ? 'flex' : 'none';
  showToast(isAdmin ? 'Switched to Admin mode' : 'Switched to Student mode');
}

// ========== TIMER ==========
function setTimerMode(mode, btn) {
  timerMode = mode;
  if (timerRunning) resetTimer();
  timeLeft = timerDurations[mode];
  totalTime = timerDurations[mode];
  updateTimerDisplay();
  // update page btns
  document.querySelectorAll('.timer-mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.pomo-mode-btn').forEach(b => b.classList.remove('active'));
  if (btn && btn.classList.contains('timer-mode-btn')) btn.classList.add('active');
  const modeLabels = { focus:'FOCUS', short:'SHORT BREAK', long:'LONG BREAK' };
  document.getElementById('bigModeLabel').textContent = modeLabels[mode];
  // set float btn
  if (mode==='focus') { document.getElementById('floatFocusBtn').classList.add('active'); }
  else if (mode==='short') { document.getElementById('floatShortBtn').classList.add('active'); }
  else { document.getElementById('floatLongBtn').classList.add('active'); }
}

function updateDurations() {
  timerDurations.focus = parseInt(document.getElementById('settingFocus').value) * 60;
  timerDurations.short = parseInt(document.getElementById('settingShort').value) * 60;
  timerDurations.long = parseInt(document.getElementById('settingLong').value) * 60;
  if (!timerRunning) {
    timeLeft = timerDurations[timerMode];
    totalTime = timerDurations[timerMode];
    updateTimerDisplay();
  }
}

function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timerStartBtn').textContent = 'Resume';
    document.getElementById('floatPlayIcon').className = 'fas fa-play';
    document.getElementById('floatPlayBtn').classList.remove('active-btn');
    document.getElementById('bigRingProg').classList.remove('running');
  } else {
    timerRunning = true;
    document.getElementById('timerStartBtn').textContent = 'Pause';
    document.getElementById('floatPlayIcon').className = 'fas fa-pause';
    document.getElementById('floatPlayBtn').classList.add('active-btn');
    document.getElementById('bigRingProg').classList.add('running');
    timerInterval = setInterval(tick, 1000);
  }
}

function tick() {
  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    timerRunning = false;
    logSession();
    showToast('Session complete! ✅');
    document.getElementById('timerStartBtn').textContent = 'Start';
    document.getElementById('floatPlayIcon').className = 'fas fa-play';
    document.getElementById('floatPlayBtn').classList.remove('active-btn');
    document.getElementById('bigRingProg').classList.remove('running');
    return;
  }
  timeLeft--;
  updateTimerDisplay();
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timeLeft = timerDurations[timerMode];
  totalTime = timerDurations[timerMode];
  document.getElementById('timerStartBtn').textContent = 'Start';
  document.getElementById('floatPlayIcon').className = 'fas fa-play';
  document.getElementById('floatPlayBtn').classList.remove('active-btn');
  document.getElementById('bigRingProg').classList.remove('running');
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft/60).toString().padStart(2,'0');
  const s = (timeLeft%60).toString().padStart(2,'0');
  const str = m+':'+s;
  document.getElementById('bigTime').textContent = str;
  document.getElementById('floatTime').textContent = str;
  // rings
  const bigCirc = 2*Math.PI*96;
  const bigOff = bigCirc * (1 - timeLeft/totalTime);
  document.getElementById('bigRingProg').style.strokeDashoffset = bigOff;
  const floatCirc = 2*Math.PI*18;
  const floatOff = floatCirc * (1 - timeLeft/totalTime);
  document.getElementById('floatRing').style.strokeDashoffset = floatOff;
}

function logSession() {
  const label = document.getElementById('sessionLabel').value || timerMode + ' session';
  const duration = timerDurations[timerMode];
  const now = new Date();
  const sess = { label, type: timerMode === 'focus' ? 'focus' : 'break', duration, time: now, date: now };
  sessions.unshift(sess);
  // add to calendar events
  calendarEvents.push({ type: 'pomo', date: now, label });
  renderSessionLog();
  renderDashSessions();
  updateStats();
  renderMiniCal();
}

function renderSessionLog() {
  const tbody = document.getElementById('sessionLogBody');
  if (sessions.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="color:var(--text3);text-align:center;padding:20px">No sessions logged yet</td></tr>';
    return;
  }
  tbody.innerHTML = sessions.slice(0,20).map(s => {
    const m = Math.floor(s.duration/60); const sec = s.duration%60;
    return `<tr>
      <td>${s.label}</td>
      <td><span class="tag ${s.type}">${s.type==='focus'?'Focus':'Break'}</span></td>
      <td style="font-family:'DM Mono',monospace">${m}m ${sec.toString().padStart(2,'0')}s</td>
      <td style="color:var(--text3)">${formatTime(s.time)}</td>
    </tr>`;
  }).join('');
}

function renderDashSessions() {
  const el = document.getElementById('dashSessionList');
  if (sessions.length === 0) {
    el.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:20px 0;text-align:center;">No sessions yet. Start your first Pomodoro!</div>';
    return;
  }
  el.innerHTML = sessions.slice(0,5).map(s => {
    const m = Math.floor(s.duration/60);
    return `<div class="session-item">
      <div class="session-dot ${s.type}"></div>
      <div class="session-info">
        <div class="session-name">${s.label}</div>
        <div class="session-meta">${formatDate(s.time)}</div>
      </div>
      <div class="session-dur">${m}m</div>
    </div>`;
  }).join('');
}

function updateStats() {
  const today = new Date(); today.setHours(0,0,0,0);
  const focusToday = sessions.filter(s => s.type==='focus' && s.date >= today);
  const totalSecs = focusToday.reduce((a,s)=>a+s.duration,0);
  const h = Math.floor(totalSecs/3600), m = Math.floor((totalSecs%3600)/60);
  document.getElementById('statToday').textContent = h+'h '+m+'m';
  const week = new Date(); week.setDate(week.getDate()-7);
  document.getElementById('statWeek').textContent = sessions.filter(s=>s.type==='focus'&&s.date>=week).length;
  document.getElementById('statActivities').textContent = activities.filter(a=>a.added).length;
}

// ========== CALENDAR ==========
function calNav(dir) {
  calDate.setMonth(calDate.getMonth() + dir);
  renderFullCal();
}

function renderFullCal() {
  const y = calDate.getFullYear(), mo = calDate.getMonth();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calTitle').textContent = months[mo] + ' ' + y;
  const first = new Date(y, mo, 1).getDay();
  const days = new Date(y, mo+1, 0).getDate();
  let html = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="full-cal-dow">${d}</div>`).join('');
  // prev month padding
  const prevDays = new Date(y, mo, 0).getDate();
  for (let i=first-1; i>=0; i--) {
    html += `<div class="full-cal-cell other"><div class="cell-num">${prevDays-i}</div></div>`;
  }
  const today = new Date(); today.setHours(0,0,0,0);
  for (let d=1; d<=days; d++) {
    const cellDate = new Date(y, mo, d);
    const isToday = cellDate.getTime()===today.getTime();
    const evts = getEventsForDate(cellDate);
    const evtHtml = evts.slice(0,3).map(e=>`<div class="cell-event ${e.type}" title="${e.label}">${e.label}</div>`).join('');
    html += `<div class="full-cal-cell${isToday?' today':''}">
      <div class="cell-num">${d}</div>
      ${evtHtml}
      ${evts.length>3?`<div style="font-size:10px;color:var(--text3)">+${evts.length-3} more</div>`:''}
    </div>`;
  }
  document.getElementById('fullCal').innerHTML = html;
}

function getEventsForDate(date) {
  const events = [];
  sessions.forEach(s => {
    const sd = new Date(s.date); sd.setHours(0,0,0,0);
    if (sd.getTime()===date.getTime()) events.push({type:'pomo',label:s.label});
  });
  calendarEvents.forEach(e => {
    if (e.date) {
      const ed = new Date(e.date); ed.setHours(0,0,0,0);
      if (ed.getTime()===date.getTime()) events.push({type:e.type||'schedule',label:e.label});
    }
  });
  activities.filter(a=>a.added).forEach(a => {
    if (a.date) {
      const ad = new Date(a.date); ad.setHours(0,0,0,0);
      if (ad.getTime()===date.getTime()) events.push({type:'activity',label:a.title});
    }
  });
  return events;
}

function renderMiniCal() {
  const now = new Date();
  const y = now.getFullYear(), mo = now.getMonth();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const first = new Date(y, mo, 1).getDay();
  const days = new Date(y, mo+1, 0).getDate();
  let html = `<div class="mini-cal-header">
    <div class="mini-cal-title">${months[mo]} ${y}</div>
  </div>
  <div class="mini-cal-grid">`;
  ['S','M','T','W','T','F','S'].forEach(d=>{ html+=`<div class="mini-cal-dow">${d}</div>`; });
  for (let i=0;i<first;i++) html+='<div></div>';
  const today2 = now.getDate();
  for (let d=1;d<=days;d++) {
    const cellDate = new Date(y,mo,d);
    const hasSession = sessions.some(s=>{const sd=new Date(s.date);sd.setHours(0,0,0,0);return sd.getTime()===cellDate.getTime()});
    const isToday = d===today2;
    html+=`<div class="mini-cal-day${isToday?' today':hasSession?' session-day':''}">${d}</div>`;
  }
  html+='</div>';
  document.getElementById('miniCal').innerHTML = html;
}

// ========== AI SCHEDULE ==========
async function sendAiMsg() {
  const input = document.getElementById('aiInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addAiMsg(text, 'user');
  // Show typing
  const typingId = addTyping();
  try {
    const resp = await callClaude(
      `You are a schedule extraction assistant for students. The user will paste their timetable or describe their schedule. 
Extract events and respond in two parts:
1. A friendly confirmation message (1-2 sentences)
2. A JSON array of events in this exact format, wrapped in <events></events> tags:
[{"label":"Event name","date":"YYYY-MM-DD","time":"HH:MM","type":"schedule"}]

For relative dates, use today's date as reference: ${new Date().toISOString().split('T')[0]}
If no specific dates are given, spread events over the coming weeks.
Always extract at least 1-3 events from any schedule description.

User input: "${text}"`,
      text
    );
    removeTyping(typingId);
    // Parse response
    const evtMatch = resp.match(/<events>([\s\S]*?)<\/events>/);
    let message = resp.replace(/<events>[\s\S]*?<\/events>/g, '').trim();
    if (!message) message = "Got it! I've extracted your schedule events.";
    addAiMsg(message, 'ai');
    if (evtMatch) {
      try {
        const evts = JSON.parse(evtMatch[1].trim());
        evts.forEach(e => { calendarEvents.push({ ...e, date: new Date(e.date + 'T' + (e.time||'00:00')) }); });
        renderExtractedEvents(evts);
        showToast(evts.length + ' events added to calendar!');
      } catch(e) {}
    }
  } catch(e) {
    removeTyping(typingId);
    addAiMsg("Sorry, I couldn't connect to the AI right now. Try again shortly.", 'ai');
  }
}

async function callClaude(systemPrompt, userMsg) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      system: systemPrompt,
      messages:[{role:'user',content:userMsg}]
    })
  });
  const data = await res.json();
  return data.content.map(c=>c.text||'').join('');
}

// ========== UTILS ==========
function formatTime(d) {
  return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}
function formatDate(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dd = new Date(d); dd.setHours(0,0,0,0);
  if (dd.getTime()===today.getTime()) return 'Today, '+formatTime(d);
  return d.toLocaleDateString([], {month:'short',day:'numeric'})+' · '+formatTime(d);
}
function formatDateStr(str) {
  if (!str) return 'TBA';
  const d = new Date(str); return d.toLocaleDateString([], {month:'short',day:'numeric',year:'numeric'});
}
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

        <div class="lb-cat-tag" style="background:${meta.bg};color:${meta.color}">${meta.emoji} ${meta.label}</div>
        <div class="lb-caption">${p.caption}</div>
        <div class="lb-footer">
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:20px;height:20px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--text2)">${p.initials}</div>
            ${p.author}
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="color:var(--text3)">${p.time}</span>
            <button class="lb-like-btn${p.liked?' liked':''}" onclick="toggleLike(${p.id})">
              <i class="fa${p.liked?'s':'r'} fa-heart"></i> ${p.likes}
            </button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterBoard(cat, btn) {
  lbFilter = cat;
  renderLifeBoard();
}

function toggleLike(id) {
  const p = posts.find(x=>x.id===id);
  if (!p) return;
  p.liked = !p.liked;
  p.likes += p.liked ? 1 : -1;
  renderLifeBoard();
}

function openPostModal() {
  document.getElementById('postModalOverlay').classList.add('open');
  pendingMediaDataUrl = null;
  pendingMediaType = null;
  document.getElementById('mediaPreview').style.display = 'none';
  document.getElementById('postCaption').value = '';
  selectedCat = 'study';
  document.querySelectorAll('.cat-pick').forEach(b=>b.classList.toggle('active', b.dataset.cat==='study'));
  document.getElementById('mediaUploadZone').innerHTML = '<i class="fas fa-photo-film" style="font-size:24px;color:var(--text3);margin-bottom:8px;display:block"></i><div style="font-size:13px;color:var(--text2)">Click to upload photo or video</div><div style="font-size:11px;color:var(--text3);margin-top:4px">JPG, PNG, GIF, MP4 supported</div>';
}
function closePostModal(e) {
  if (!e || e.target===document.getElementById('postModalOverlay')) {
    document.getElementById('postModalOverlay').classList.remove('open');
  }
}

function pickCat(cat, btn) {
  selectedCat = cat;
  document.querySelectorAll('.cat-pick').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function handleMediaUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    pendingMediaDataUrl = e.target.result;
    pendingMediaType = file.type;
    const zone = document.getElementById('mediaUploadZone');
    zone.innerHTML = `<i class="fas fa-check-circle" style="color:var(--green);font-size:20px;margin-bottom:6px;display:block"></i><div style="font-size:13px">${file.name}</div>`;
    const prev = document.getElementById('mediaPreview');
    prev.style.display = 'block';
    if (file.type.startsWith('video')) {
      prev.innerHTML = `<video src="${pendingMediaDataUrl}" controls style="width:100%;max-height:180px;border-radius:var(--radius-sm)"></video>`;
    } else {
      prev.innerHTML = `<img src="${pendingMediaDataUrl}" style="width:100%;max-height:180px;object-fit:cover;border-radius:var(--radius-sm)">`;
    }
  };
  reader.readAsDataURL(file);
}

function submitPost() {
  const caption = document.getElementById('postCaption').value.trim();
  if (!caption) { showToast('Please write a caption'); return; }
  const post = {
    id: Date.now(),
    cat: selectedCat,
    caption,
    author: 'Alex J',
    initials: 'AJ',
    time: 'Just now',
    likes: 0,
    liked: false,
    mediaUrl: pendingMediaDataUrl || null,
    mediaType: pendingMediaType || null,
  };
  posts.unshift(post);
  closePostModal();
  lbFilter = 'all';
  renderLifeBoard();
  showToast('Posted to Life Board! 🎉');
}

// ========== INIT ==========
renderMiniCal();

renderDashSessions();
updateStats();
renderSessionLog();
renderActivities();
// set today in date input
document.getElementById('newDate').value = new Date().toISOString().split('T')[0];
</script>
</body>
